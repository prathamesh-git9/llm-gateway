services:
  gateway:
    build: .
    ports:
      - "8000:8000"
    environment:
      GATEWAY_PROVIDERS: echo
      GATEWAY_CACHE_ENABLED: "true"

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - gateway
